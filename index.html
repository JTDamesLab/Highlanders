<style>

  .img-placeholder { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 28px; font-style: italic; opacity: 0.5; }

  .rarity { display: flex; gap: 2px; margin-top: 6px; }
  .rarity-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--mist); opacity: 0.2; }
  .rarity-dot.filled { opacity: 0.7; background: var(--gold); }
  .check { width: 28px; height: 28px; border: 1.5px solid rgba(232, 227, 216, 0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s ease; background: transparent; cursor: pointer; }
  .animal.spotted .check { border-color: var(--gold); background: var(--gold); }
  .check svg { width: 14px; height: 14px; stroke: var(--ink); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transform: scale(0.5); transition: all 0.3s ease; }
  .animal.spotted .check svg { opacity: 1; transform: scale(1); }
  .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 32px auto 0; }
  .btn { padding: 10px 20px; background: transparent; border: 1px solid rgba(232, 227, 216, 0.2); color: var(--mist); font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; border-radius: 2px; cursor: pointer; }
  .btn:active { background: rgba(232, 227, 216, 0.05); }
  .btn.primary { border-color: var(--gold); color: var(--gold); }
  .ornament { text-align: center; color: var(--gold); opacity: 0.4; margin: 8px 0 0; font-size: 14px; letter-spacing: 0.5em; }
  .no-results { text-align: center; padding: 60px 20px; color: var(--mist); opacity: 0.6; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; display: none; }
  .no-results.show { display: block; }
  .lightbox { position: fixed; inset: 0; background: rgba(10, 13, 10, 0.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px; padding-top: max(60px, env(safe-area-inset-top)); padding-bottom: max(24px, env(safe-area-inset-bottom)); animation: fadeIn 0.25s ease; }

</head>

<div class="container">

</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">

</div>

</div>

const RARITY_LABELS = ['', 'Zeer algemeen', 'Algemeen', 'Soms', 'Zeldzaam', 'Zeer zeldzaam'];
const STORAGE_KEY = 'highlands-spotted-v2';
const IMAGE_CACHE_KEY = 'highlands-images-v4';
let spotted = {};
let imageCache = {};
let db = null;
let searchTerm = '';

function openDB() { return new Promise((resolve) => { try { const req = indexedDB.open('highlands-spotter', 1); req.onupgradeneeded = (e) => { const d = e.target.result; if (!d.objectStoreNames.contains('state')) d.createObjectStore('state'); }; req.onsuccess = (e) => { db = e.target.result; resolve(db); }; req.onerror = () => resolve(null); } catch(e) { resolve(null); } }); }
async function dbGet(key) { if (!db) return null; return new Promise((r) => { try { const tx = db.transaction('state', 'readonly'); const req = tx.objectStore('state').get(key); req.onsuccess = () => r(req.result); req.onerror = () => r(null); } catch(e) { r(null); } }); }
async function dbSet(key, value) { if (!db) return; return new Promise((r) => { try { const tx = db.transaction('state', 'readwrite'); tx.objectStore('state').put(value, key); tx.oncomplete = () => r(); tx.onerror = () => r(); } catch(e) { r(); } }); }
function setCookie(name, value) { try { const d = new Date(); d.setFullYear(d.getFullYear() + 5); document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=Lax`; } catch(e) {} }
function getCookie(name) { try { const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)')); return m ? decodeURIComponent(m[2]) : null; } catch(e) { return null; } }

async function loadState() {
  const sources = [];
  try { const v = await dbGet(STORAGE_KEY); if (v) sources.push(v); } catch(e) {}
  try { const v = localStorage.getItem(STORAGE_KEY); if (v) sources.push(v); } catch(e) {}
  const ck = getCookie(STORAGE_KEY); if (ck) sources.push(ck);
  let best = null, bestCount = -1;
  for (const s of sources) { try { const obj = JSON.parse(s); const c = Object.keys(obj).length; if (c > bestCount) { bestCount = c; best = obj; } } catch(e) {} }
  spotted = best || {};
  try { const cached = await dbGet(IMAGE_CACHE_KEY); if (cached) imageCache = typeof cached === 'string' ? JSON.parse(cached) : cached; } catch(e) {}
  if (!imageCache || Object.keys(imageCache).length === 0) {
    try { const ls = localStorage.getItem(IMAGE_CACHE_KEY); if (ls) imageCache = JSON.parse(ls); } catch(e) { imageCache = {}; }
  }
}
async function saveState() { const json = JSON.stringify(spotted); try { localStorage.setItem(STORAGE_KEY, json); } catch(e) {} setCookie(STORAGE_KEY, json); await dbSet(STORAGE_KEY, json); }
async function saveImageCache() { const json = JSON.stringify(imageCache); try { localStorage.setItem(IMAGE_CACHE_KEY, json); } catch(e) {} await dbSet(IMAGE_CACHE_KEY, json); }

// === ROBUUSTE FOTO-OPHAAL ===
// Probeert 3 strategieën in volgorde:
// 1. Wikipedia REST API page/summary met de wiki-naam
// 2. Wikipedia search API om de juiste pagina te vinden via Latijnse naam
// 3. Wikipedia search API met Engelse naam fallback
async function fetchImageStrategy1(wikiPage) {
  try {
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiPage)}`;
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!r.ok) return null;
    const j = await r.json();
    if (j.thumbnail?.source) {
      return { thumb: j.thumbnail.source, full: j.originalimage?.source || j.thumbnail.source };
    }
  } catch(e) {}
  return null;
}

async function fetchImageStrategy2(searchTerm) {
  try {
    // Use Wikipedia opensearch API to find the actual page
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=pageimages&piprop=thumbnail|original&pithumbsize=400&generator=search&gsrsearch=${encodeURIComponent(searchTerm)}&gsrlimit=1&origin=*`;
    const r = await fetch(searchUrl);
    if (!r.ok) return null;
    const j = await r.json();
    const pages = j.query?.pages;
    if (!pages) return null;
    const page = Object.values(pages)[0];
    if (page?.thumbnail?.source) {
      return { thumb: page.thumbnail.source, full: page.original?.source || page.thumbnail.source };
    }
  } catch(e) {}
  return null;
}

async function fetchAnimalImage(animal) {
  const cacheKey = animal.wiki;
  if (imageCache[cacheKey] && imageCache[cacheKey].thumb) return imageCache[cacheKey];
  
  // Strategie 1: gebruik wiki-pagina-naam
  let result = await fetchImageStrategy1(animal.wiki);
  
  // Strategie 2: zoek op Latijnse naam
  if (!result && animal.latin) {
    result = await fetchImageStrategy2(animal.latin);
  }
  
  // Strategie 3: zoek op wiki naam met underscores vervangen
  if (!result) {
    result = await fetchImageStrategy2(animal.wiki.replace(/_/g, ' '));
  }
  
  // Cache het resultaat (ook als null, om herhaalde pogingen te voorkomen tenzij user reload klikt)
  imageCache[cacheKey] = result || { thumb: null, full: null, failed: true };
  return imageCache[cacheKey];
}

function makeKey(c, n) { return c + '::' + n; }

function render() {
  const container = document.getElementById('categories');
  container.innerHTML = '';
  let totalAnimals = 0, totalSpotted = 0;
  data.forEach(cat => {
    const sorted = [...cat.animals].sort((a,b) => a.rarity - b.rarity);
    totalAnimals += sorted.length;
    const catSpotted = sorted.filter(a => spotted[makeKey(cat.name, a.name)]).length;
    totalSpotted += catSpotted;
    const catEl = document.createElement('section');
    catEl.className = 'category';
    catEl.innerHTML = `<div class="category-header"><span class="category-icon">${cat.icon}</span><span class="category-name">${cat.name}</span><span class="category-count">${catSpotted} / ${sorted.length}</span></div><div class="animal-list"></div>`;
    const list = catEl.querySelector('.animal-list');
    sorted.forEach(animal => {
      const key = makeKey(cat.name, animal.name);
      const isSpotted = !!spotted[key];
      const dots = Array.from({length: 5}, (_, i) => `<span class="rarity-dot ${i < animal.rarity ? 'filled' : ''}"></span>`).join('');
      const cached = imageCache[animal.wiki];
      let imgHtml;
      if (cached && cached.thumb) {
        imgHtml = `<img class="animal-img" src="${cached.thumb}" alt="${animal.name}" loading="lazy" referrerpolicy="no-referrer">`;
      } else if (cached && cached.failed) {
        imgHtml = `<div class="img-placeholder">?</div>`;
      } else {
        imgHtml = `<div class="img-loading" data-wiki="${animal.wiki}"></div>`;
      }
      const el = document.createElement('div');
      el.className = 'animal' + (isSpotted ? ' spotted' : '');
      el.dataset.searchText = (animal.name + ' ' + animal.latin).toLowerCase();
      el.innerHTML = `<div class="animal-img-wrap">${imgHtml}</div><div class="animal-info"><div class="animal-name">${animal.name}</div><div class="animal-latin">${animal.latin}</div><div class="rarity">${dots}</div></div><div class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg></div>`;
      const toggleSpot = async (e) => { e.stopPropagation(); if (spotted[key]) delete spotted[key]; else { spotted[key] = Date.now(); if (navigator.vibrate) navigator.vibrate(15); } await saveState(); render(); applyFilter(); };
      el.querySelector('.animal-info').addEventListener('click', toggleSpot);
      el.querySelector('.check').addEventListener('click', toggleSpot);
      el.querySelector('.animal-img-wrap').addEventListener('click', (e) => { e.stopPropagation(); openLightbox(animal); });
      list.appendChild(el);
    });
    container.appendChild(catEl);
  });
  document.getElementById('totalSpotted').textContent = totalSpotted;
  document.getElementById('totalAnimals').textContent = totalAnimals;
  applyFilter();
}

async function loadAllImages(retryFailed = false) {
  const allAnimals = data.flatMap(c => c.animals);
  const todo = allAnimals.filter(a => {
    const c = imageCache[a.wiki];
    if (!c) return true;
    if (retryFailed && c.failed) return true;
    if (!c.thumb && !c.failed) return true;
    return false;
  });
  if (todo.length === 0) return;
  
  // Reset failed entries als we retry doen
  if (retryFailed) {
    todo.forEach(a => { delete imageCache[a.wiki]; });
  }
  
  const banner = document.getElementById('loadingBanner');
  banner.classList.add('show');
  let done = 0;
  banner.textContent = `📷 Foto's laden... 0/${todo.length}`;
  
  for (let i = 0; i < todo.length; i += 4) {
    const batch = todo.slice(i, i + 4);
    await Promise.all(batch.map(async a => {
      await fetchAnimalImage(a);
      done++;
      banner.textContent = `📷 Foto's laden... ${done}/${todo.length}`;
      // Update placeholder live
      document.querySelectorAll(`.img-loading[data-wiki="${a.wiki}"]`).forEach(ph => {
        const cached = imageCache[a.wiki];
        if (cached && cached.thumb) {
          const img = document.createElement('img');
          img.className = 'animal-img';
          img.src = cached.thumb;
          img.alt = a.name;
          img.loading = 'lazy';
          img.referrerPolicy = 'no-referrer';
          ph.replaceWith(img);
        } else {
          ph.classList.remove('img-loading');
          ph.classList.add('img-placeholder');
          ph.textContent = '?';
        }
      });
    }));
    await saveImageCache();
  }
  
  const failedCount = Object.values(imageCache).filter(c => c.failed).length;
  if (failedCount === 0) {
    banner.textContent = `✓ Alle foto's geladen`;
  } else {
    banner.textContent = `✓ ${todo.length - failedCount}/${todo.length} foto's geladen`;
  }
  setTimeout(() => banner.classList.remove('show'), 2500);
}

async function reloadFailedImages() {
  showToast('Faalde foto\'s opnieuw laden...');
  await loadAllImages(true);
  render();
}

function applyFilter() {
  const term = searchTerm.toLowerCase().trim();
  let totalVisible = 0;
  document.querySelectorAll('.category').forEach(cat => {
    let catVisible = 0;
    cat.querySelectorAll('.animal').forEach(an => {
      const match = !term || an.dataset.searchText.includes(term);
      an.classList.toggle('hidden', !match);
      if (match) catVisible++;
    });
    cat.classList.toggle('hidden', catVisible === 0);
    totalVisible += catVisible;
  });
  document.getElementById('noResults').classList.toggle('show', totalVisible === 0 && term.length > 0);
}

async function openLightbox(animal) {
  const img = document.getElementById('lightboxImg');
  document.getElementById('lightboxTitle').textContent = animal.name;
  document.getElementById('lightboxLatin').textContent = animal.latin;
  const dots = Array.from({length: 5}, (_, i) => `<span class="rarity-dot ${i < animal.rarity ? 'filled' : ''}"></span>`).join('');
  document.getElementById('lightboxRarity').innerHTML = dots;
  document.getElementById('lightboxRarityLabel').textContent = RARITY_LABELS[animal.rarity];
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
  let cached = imageCache[animal.wiki];
  if (cached && cached.thumb) img.src = cached.thumb;
  if (!cached || (!cached.full && !cached.failed)) cached = await fetchAnimalImage(animal);
  if (cached && cached.full) img.src = cached.full;
}
function closeLightbox(e) { if (e && e.target.closest('.lightbox-content') && !e.target.classList.contains('lightbox-close')) return; document.getElementById('lightbox').classList.remove('show'); document.body.style.overflow = ''; }
async function resetAll() { if (confirm('Alle gespotte dieren wissen?')) { spotted = {}; await saveState(); document.cookie = `${STORAGE_KEY}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`; render(); } }
function openBackup() { document.getElementById('backupCode').value = btoa(JSON.stringify(spotted)); document.getElementById('backupModal').classList.add('show'); }
function closeBackup() { document.getElementById('backupModal').classList.remove('show'); }
async function copyBackup() { const ta = document.getElementById('backupCode'); ta.select(); try { await navigator.clipboard.writeText(ta.value); showToast('Gekopieerd!'); } catch(e) { document.execCommand('copy'); showToast('Gekopieerd'); } }
async function restoreBackup() { const code = document.getElementById('backupCode').value.trim(); if (!code) { showToast('Plak eerst een code'); return; } try { const obj = JSON.parse(atob(code)); if (typeof obj !== 'object') throw new Error(); spotted = obj; await saveState(); render(); closeBackup(); showToast(`Hersteld: ${Object.keys(obj).length} vinkjes`); } catch(e) { showToast('Ongeldige code'); } }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }
function clearSearch() { document.getElementById('searchInput').value = ''; searchTerm = ''; document.getElementById('searchClear').classList.remove('show'); applyFilter(); }
document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value; document.getElementById('searchClear').classList.toggle('show', searchTerm.length > 0); applyFilter(); });
(async () => { await openDB(); await loadState(); render(); loadAllImages(); })();
</script>
